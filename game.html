<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎮 Лови Стрелы - Полотно 10000</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    padding: 20px;
  }
  
  #ui {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    text-align: center;
    z-index: 100;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  
  #score {
    font-size: 3rem;
    font-weight: bold;
  }
  
  #bestScore {
    font-size: 1rem;
    opacity: 0.9;
    margin-top: 5px;
  }
  
  #lineLimit {
    font-size: 0.85rem;
    color: #fbbf24;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s;
    font-weight: 600;
  }
  
  #lineLimit.visible {
    opacity: 1;
  }
  
  #gameCanvas {
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    cursor: crosshair;
    touch-action: none;
  }
  
  #gameOver, #startScreen {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 40px 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 1000;
    min-width: 350px;
    max-width: 450px;
  }
  
  #startScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  #startScreen h1 {
    font-size: 2rem;
    margin-bottom: 20px;
    color: #1a1a2e;
  }
  
  .rules {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
    margin: 20px 0;
    text-align: left;
    width: 100%;
  }
  
  .rules h3 {
    margin-bottom: 10px;
    color: #1a1a2e;
  }
  
  .rules ul {
    list-style: none;
    padding: 0;
  }
  
  .rules li {
    margin: 8px 0;
    padding-left: 25px;
    position: relative;
    color: #4b5563;
  }
  
  .rules li::before {
    content: attr(data-icon);
    position: absolute;
    left: 0;
  }
  
  #gameOver {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  #gameOver h1 {
    color: #dc2626;
    margin-bottom: 30px;
    font-size: 2rem;
    line-height: 1.2;
  }
  
  #gameOver .score-item {
    margin: 15px 0;
    font-size: 1.2rem;
    color: #4b5563;
    width: 100%;
  }
  
  #gameOver .score-label {
    display: block;
    margin-bottom: 5px;
  }
  
  #gameOver .score-number {
    display: block;
    color: #2563eb;
    font-size: 2.5rem;
    font-weight: bold;
  }
  
  .btn {
    margin-top: 30px;
    padding: 15px 40px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    display: inline-block;
    width: 100%;
    max-width: 250px;
  }
  
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
  }
  
  .btn:active {
    transform: translateY(0);
  }
  
  #backBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    z-index: 100;
    transition: background 0.2s;
    backdrop-filter: blur(10px);
  }
  
  #backBtn:hover {
    background: rgba(255,255,255,0.3);
  }
  
  @media (max-width: 600px) {
    #score { font-size: 2.5rem; }
    
    #gameOver, #startScreen {
      padding: 30px 25px;
      min-width: auto;
      max-width: 90%;
      width: 90%;
    }
    
    #startScreen h1 { font-size: 1.5rem; }
    .rules { font-size: 0.9rem; padding: 15px; }
    
    #gameOver h1 {
      font-size: 1.5rem;
      margin-bottom: 25px;
    }
    
    #gameOver .score-item {
      font-size: 1rem;
      margin: 12px 0;
    }
    
    #gameOver .score-number {
      font-size: 2rem;
    }
    
    .btn {
      padding: 12px 30px;
      font-size: 1rem;
      max-width: none;
    }
    
    #backBtn {
      padding: 8px 15px;
      font-size: 0.9rem;
    }
  }
  </style>
</head>
<body>
  <a href="index.html" id="backBtn">← На главную</a>
  
  <div id="ui">
  <div id="score">0</div>
  <div id="bestScore">Рекорд: 0</div>
  <div id="lineLimit">⚠️ Максимальная длина!</div>
</div>
  
  <canvas id="gameCanvas"></canvas>
  
  <div id="startScreen" style="display: flex;">
    <h1>🏹 Лови Стрелы</h1>
    <div class="rules">
      <h3>📋 Правила:</h3>
      <ul>
        <li data-icon="🎨">Рисуй чёрные линии</li>
        <li data-icon="🏹">Стрелы летят сверху</li>
        <li data-icon="✅">Лови стрелы (+1 очко)</li>
        <li data-icon="❌">Пропустил = Game Over</li>
        <li data-icon="⚠️">Нельзя через всё поле</li>
        <li data-icon="📏">Макс. ~1.5 см за раз</li>
      </ul>
    </div>
     <p style="color: #6b7280; margin: 10px 0;">🎵 Включи звук!</p>
  
  <button class="btn" onclick="startGame()">🎮 Начать игру</button>
</div>
    <p style="color: #6b7280; margin: 10px 0;">🎵 Включи звук!</p>
    <button class="btn" onclick="startGame()">🎮 Начать игру</button>
  </div>
  
  <div id="gameOver">
    <h1>💀 Игра окончена!</h1>
    
    <div class="score-item">
      <span class="score-label">Твой счёт:</span>
      <span id="finalScore" class="score-number">0</span>
    </div>
    
    <div class="score-item">
      <span class="score-label">Рекорд:</span>
      <span id="finalBest" class="score-number">0</span>
    </div>
    
    <button class="btn" onclick="restartGame()">🔄 Играть снова</button>
  </div>
  
  <audio id="bgMusic" loop>
    <source src="https://archive.org/download/xtentacion-jocelyn-flores-instrumental-63537199-music/Xtentacion_-_Jocelyn_Flores_instrumental_63537199%20%5Bmusic%5D.mp3">
  </audio>
  
  <script src="game.js"></script>
<script>
// При загрузке страницы
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('gameOver').style.display = 'none';
});
</script>
</body>
</html>
