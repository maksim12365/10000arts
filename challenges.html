<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Челленджи - Полотно 10000</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.0.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.0/dist/tesseract.min.js"></script>
</head>
<body>
  <header style="text-align:center;padding:20px;">
    <h1>🎯 Испытания</h1>
    <p>Выполни челленджи — получи достижения!</p>
    <a href="index.html" style="background:#667eea;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;">← На главную</a>
    <a href="achievements.html" style="background:#11998e;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;margin-left:10px;">🏆 Достижения</a>
  </header>
  
  <div id="stats" style="text-align:center;padding:20px;background:#f5f5f5;margin:20px auto;max-width:600px;border-radius:12px;"></div>
  
  <div id="challengeList" style="max-width:800px;margin:0 auto;padding:20px;"></div>
  
  <div id="activeChallenge" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100000;">
    <div style="background:white;max-width:600px;margin:50px auto;padding:20px;border-radius:16px;">
      <h2 id="activeTitle">Челлендж</h2>
      <div id="timer" class="timer-display">00:00</div>
      <canvas id="challengeCanvas" width="256" height="256" style="border:2px solid #ddd;border-radius:8px;display:block;margin:20px auto;"></canvas>
      <div id="colorPicker" style="text-align:center;margin:10px 0;">
        <button onclick="setColor('#ff0000')" style="width:30px;height:30px;background:#ff0000;border:none;border-radius:50%;"></button>
        <button onclick="setColor('#00ff00')" style="width:30px;height:30px;background:#00ff00;border:none;border-radius:50%;"></button>
        <button onclick="setColor('#0000ff')" style="width:30px;height:30px;background:#0000ff;border:none;border-radius:50%;"></button>
        <button onclick="setColor('#ffff00')" style="width:30px;height:30px;background:#ffff00;border:none;border-radius:50%;"></button>
        <button onclick="setColor('#000000')" style="width:30px;height:30px;background:#000000;border:none;border-radius:50%;"></button>
        <button onclick="clearCanvas()" style="padding:5px 10px;margin-left:10px;">🗑 Очистить</button>
      </div>
      <div class="attempts-left" id="attemptsInfo"></div>
      <div style="text-align:center;margin-top:20px;">
        <button onclick="submitChallenge()" style="background:#11998e;color:white;padding:15px 30px;border:none;border-radius:8px;font-size:1.1rem;cursor:pointer;">✅ Готово</button>
        <button onclick="closeChallenge()" style="background:#999;color:white;padding:15px 30px;border:none;border-radius:8px;font-size:1.1rem;cursor:pointer;margin-left:10px;">❌ Отмена</button>
      </div>
    </div>
  </div>
  
  <script src="challenge-system.js"></script>
  <script>
    let currentChallenge = null;
    let timerInterval = null;
    let currentColor = '#000000';
    let isDrawing = false;
    
    // Статистика
    function updateStats() {
      const stats = ChallengeSystem.getStats();
      const completed = ChallengeSystem.getCompletedCount();
      document.getElementById('stats').innerHTML = `
        <strong>🏆 Очки:</strong> ${stats.points} | 
        <strong>✅ Выполнено:</strong> ${completed}/${CHALLENGES.length}
      `;
    }
    
    // Рендер челленджей
    function renderChallenges() {
      const available = ChallengeSystem.getAvailableChallenges();
      const container = document.getElementById('challengeList');
      
      container.innerHTML = available.map(c => {
        const completed = ChallengeSystem.isCompleted(c.id);
        return `
          <div class="challenge-card difficulty-${c.difficulty} ${completed ? 'completed' : ''}">
            <h3>${c.title}</h3>
            <p>${c.description}</p>
            <p>⏱️ ${c.timeLimit ? c.timeLimit + ' сек' : 'Без ограничений'}</p>
            <p>🎯 ${c.attempts === 1 ? '1 попытка' : 'Безлимит попыток'}</p>
            <p>🏆 ${c.reward.points} очков</p>
            ${completed 
              ? '<button disabled style="background:#11998e;color:white;">✅ Выполнено</button>' 
              : `<button onclick="openChallenge('${c.id}')" style="background:#667eea;color:white;">▶️ Начать</button>`
            }
          </div>
        `;
      }).join('');
      
      updateStats();
    }
    
    window.openChallenge = function(challengeId) {
      currentChallenge = CHALLENGES.find(c => c.id === challengeId);
      const result = ChallengeSystem.startChallenge(challengeId);
      
      if (!result.success) {
        alert(result.reason);
        return;
      }
      
      document.getElementById('activeChallenge').style.display = 'block';
      document.getElementById('activeTitle').textContent = currentChallenge.title;
      document.getElementById('attemptsInfo').textContent = `Попыток осталось: ${currentChallenge.attempts}`;
      
      // Таймер
      if (currentChallenge.timeLimit) {
        let timeLeft = currentChallenge.timeLimit;
        document.getElementById('timer').textContent = `00:${timeLeft}`;
        timerInterval = setInterval(() => {
          timeLeft--;
          document.getElementById('timer').textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert('Время вышло!');
            closeChallenge();
          }
        }, 1000);
      } else {
        document.getElementById('timer').textContent = '∞';
      }
      
      // Canvas
      const canvas = document.getElementById('challengeCanvas');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Рисование
      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDraw);
      canvas.addEventListener('mouseout', stopDraw);
      canvas.addEventListener('touchstart', startDraw);
      canvas.addEventListener('touchmove', draw);
      canvas.addEventListener('touchend', stopDraw);
    };
    
    function startDraw(e) {
      isDrawing = true;
      draw(e);
    }
    
    function draw(e) {
      if (!isDrawing) return;
      const canvas = document.getElementById('challengeCanvas');
      const ctx = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches[0].clientX) - rect.left;
      const y = (e.clientY || e.touches[0].clientY) - rect.top;
      
      ctx.fillStyle = currentColor;
      ctx.fillRect(x, y, 3, 3);
    }
    
    function stopDraw() {
      isDrawing = false;
    }
    
    window.setColor = function(color) {
      currentColor = color;
    };
    
    window.clearCanvas = function() {
      const canvas = document.getElementById('challengeCanvas');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    };
    
    window.submitChallenge = async function() {
      if (!currentChallenge) return;
      
      const canvas = document.getElementById('challengeCanvas');
      const result = await ChallengeSystem.completeChallenge(currentChallenge.id, canvas);
      
      alert(result.reason);
      
      if (result.completed) {
        renderChallenges();
      }
      
      closeChallenge();
    };
    
    window.closeChallenge = function() {
      document.getElementById('activeChallenge').style.display = 'none';
      if (timerInterval) clearInterval(timerInterval);
      currentChallenge = null;
    };
    
    renderChallenges();
  </script>
</body>
</html>
